# Screener Configuration — VN Stock Advisory MVP-1
# Modify thresholds + weights here; no code changes needed.
# All filters return (passed: bool, value: float, label: str).
# Weights are relative; engine normalises them to sum=1.

fundamentals:
  roe:
    enabled: true
    threshold: 0.15          # ROE > 15%
    weight: 2.0
    label: "ROE > 15%"

  pe_ratio:
    enabled: true
    threshold: 25.0          # P/E < 25 AND < sector median
    weight: 1.5
    label: "P/E < 25 & sector median"

  eps_growth:
    enabled: true
    threshold: 0.0           # EPS growth > 0% YoY (any positive growth)
    weight: 1.5
    label: "EPS growth YoY > 0%"

  revenue_growth:
    enabled: true
    threshold: 0.0           # Revenue growth > 0% YoY
    weight: 1.5
    label: "Revenue growth YoY > 0%"

  debt_to_equity:
    enabled: true
    threshold: 1.0           # D/E < 1.0 (skipped for banks)
    weight: 1.0
    label: "D/E < 1.0 (non-bank)"

  net_margin:
    enabled: true
    threshold: 0.05          # Net margin > 5%
    weight: 1.0
    label: "Net margin > 5%"

technicals:
  price_above_ma:
    enabled: true
    ma50_period: 50
    ma200_period: 200
    weight: 1.5
    label: "Price > MA50 & MA200"

  relative_strength:
    enabled: true
    lookback_days: 60        # RS window vs VN-Index
    weight: 1.0
    label: "RS vs VN-Index > 0"

  liquidity:
    enabled: true
    # 10 tỷ VND per session = 10_000_000_000
    # close is in thousands VND, volume is share count
    # avg_value = close * 1000 * volume → compare in absolute VND
    threshold: 10_000_000_000   # 10 tỷ VND
    lookback_days: 20
    weight: 1.0
    label: "Avg GTGD 20 phiên > 10 tỷ"

# OHLCV history window for TA calculations
ohlcv:
  start_date: "2023-01-01"    # enough history for MA200
  end_date: null              # null = today

# Ratio / financial period to use
data_period: "year"
