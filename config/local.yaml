# Local configuration for paper trading (SQLite, no Telegram, no PostgreSQL)

system:
  name: "hybrid-trading-system"
  mode: "paper"
  timezone: "UTC"
  log_level: "INFO"

data:
  exchange: "binance"
  timeframe: "4h"
  symbols:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
  start_date: "2020-01-01"
  end_date: "2026-04-21"
  data_dir: "./data/raw"
  processed_dir: "./data/processed"

strategies:
  active: "RegimeEnsemble"
  registry:
    - name: "EMA-Trend"
      module: "strategies.rule_based.ema_trend"
      class: "EMATrendStrategy"
      params:
        fast_ema: 20
        slow_ema: 50
        atr_period: 14
    - name: "Monthly-Breakout"
      module: "strategies.rule_based.monthly_breakout"
      class: "MonthlyBreakoutStrategy"
      params:
        lookback_months: 3
        atr_period: 14
    - name: "RegimeEnsemble"
      module: "strategies.ensemble.regime_ensemble"
      class: "RegimeEnsembleStrategy"
      params:
        wiki_min_alignment: 0.45

risk:
  max_risk_per_trade: 0.008
  max_total_exposure: 0.10
  max_drawdown_pct: 0.20
  max_drawdown_bull: 0.18
  max_drawdown_bear: 0.10
  max_drawdown_sideways: 0.10
  default_stop_loss_atr: 2.0
  position_sizing: "turtle_n"
  trailing_activation: 0.05
  trailing_trail_pct: 0.3

psychology:
  max_consecutive_losses: 3
  pause_after_losses_hours: 24
  max_daily_trades: 10
  revenge_emotions: ["revenge", "fomo", "panic", "angry"]
  revenge_size_multiplier: 0.5
  win_streak_cooldown: 5
  win_streak_multiplier: 0.8
  large_loss_threshold: 2.0
  large_loss_cooldown_hours: 12

backtest:
  initial_capital: 100000
  commission: 0.001
  slippage: 0.0005
  fractional_size: true

execution:
  paper: true
  exchange_id: "binance"
  api_key: ""
  api_secret: ""
  testnet: true

knowledge:
  wiki_dir: "./crawl-wiki/concepts"
  vector_db_path: "./knowledge/vector_store"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  top_k_retrieval: 5

ml:
  enabled: false
  model_dir: "./ml/models"
  retrain_frequency_days: 30
  features:
    - "returns"
    - "volatility"
    - "rsi"
    - "macd"
    - "atr"
    - "volume_ma_ratio"

monitoring:
  enabled: true
  alert_telegram: true
  telegram_bot_token: ""
  telegram_chat_id: ""
  health_port: 8080

journal:
  db_url: "postgresql://trader:trading123@localhost:5432/trading_journal"

price_alerts:
  enabled: true
  threshold_pct: 0.008
  cooldown_hours: 1.0

drawdown_alerts:
  enabled: true
  warning_pct: 0.10
  cooldown_hours: 4.0

volume_alerts:
  enabled: true
  lookback_bars: 20
  multiplier: 2.5
  cooldown_hours: 4.0

drift:
  enabled: false
  confidence_window: 30
  psi_threshold: 0.2
  error_threshold: 0.55
  cooldown_days: 7
