# System Configuration
# Copy this file to local.yaml and customize

system:
  name: "hybrid-trading-system"
  mode: "paper"  # paper | live
  timezone: "UTC"
  log_level: "INFO"

# Data configuration
data:
  exchange: "binance"
  timeframe: "1d"
  symbols:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
  start_date: "2020-01-01"
  end_date: "2026-04-21"
  data_dir: "./data/raw"
  processed_dir: "./data/processed"

# Strategy configuration
strategies:
  active: "EMA-Trend"
  registry:
    - name: "EMA-Trend"
      module: "strategies.rule_based.ema_trend"
      class: "EMATrendStrategy"
      params:
        fast_ema: 20
        slow_ema: 50
        atr_period: 14
    - name: "Monthly-Breakout"
      module: "strategies.rule_based.monthly_breakout"
      class: "MonthlyBreakoutStrategy"
      params:
        lookback_months: 3
        atr_period: 14
    - name: "RegimeEnsemble"
      module: "strategies.ensemble.regime_ensemble"
      class: "RegimeEnsembleStrategy"
      params:
        wiki_min_alignment: 0.45

# Risk management
risk:
  max_risk_per_trade: 0.008       # 0.8% base, multiplied by regime
  max_total_exposure: 0.10        # 10% in market
  max_drawdown_pct: 0.20          # 20% circuit breaker (neutral)
  max_drawdown_bull: 0.18         # 18% in bull — tightened from 25% after backtest showed -26.7% net DD
  max_drawdown_bear: 0.10         # 10% in bear
  max_drawdown_sideways: 0.10     # 10% in chop
  default_stop_loss_atr: 2.0      # 2x ATR
  position_sizing: "turtle_n"     # fixed_fractional | kelly | atr_based | turtle_n
  trailing_activation: 0.05       # 5% profit to activate trailing stop
  trailing_trail_pct: 0.3         # trail at 30% of peak profit

# Psychology / Discipline
psychology:
  max_consecutive_losses: 3
  pause_after_losses_hours: 24
  max_daily_trades: 10
  revenge_emotions: ["revenge", "fomo", "panic", "angry"]
  revenge_size_multiplier: 0.5
  win_streak_cooldown: 5
  win_streak_multiplier: 0.8
  large_loss_threshold: 2.0
  large_loss_cooldown_hours: 12

# Backtest configuration
backtest:
  initial_capital: 100000
  commission: 0.001               # 0.1%
  slippage: 0.0005                # 0.05%
  fractional_size: true

# Execution
execution:
  paper: true
  exchange_id: "binance"
  api_key: ""                     # Set in local.yaml or env var
  api_secret: ""                  # Set in local.yaml or env var
  testnet: true

# Knowledge Engine
knowledge:
  wiki_dir: "./crawl-wiki/concepts"
  vector_db_path: "./knowledge/vector_store"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  llm_provider: "openai"          # openai | anthropic | local
  llm_model: "gpt-4o-mini"
  top_k_retrieval: 5

# ML Configuration
ml:
  enabled: false
  model_dir: "./ml/models"
  retrain_frequency_days: 30
  features:
    - "returns"
    - "volatility"
    - "rsi"
    - "macd"
    - "atr"
    - "volume_ma_ratio"

# Monitoring
monitoring:
  enabled: true
  alert_telegram: true
  telegram_bot_token: ""
  telegram_chat_id: ""
  health_port: 8080

# Journal
journal:
  # PostgreSQL (recommended for production)
  db_url: "postgresql://trader:trading123@localhost:5432/trading_journal"
  # SQLite (fallback / local dev)
  # db_path: "./data/journal.db"

# Price Alerts (bilingual EN/VN)
price_alerts:
  enabled: true
  threshold_pct: 0.008          # Alert when within 0.8% of a key level
  cooldown_hours: 1.0           # 1 hour between alerts for same level

# Drawdown Alerts (warning before circuit breaker)
drawdown_alerts:
  enabled: true
  warning_pct: 0.10             # Alert at 10% drawdown (before 15-20% halt)
  cooldown_hours: 4.0           # Max 1 warning every 4 hours

# Volume Spike Alerts
volume_alerts:
  enabled: true
  lookback_bars: 20             # Compare vs 20-bar average
  multiplier: 2.5               # Alert when volume > 2.5x average
  cooldown_hours: 4.0           # Max 1 alert every 4 hours

# Model Drift Detection
drift:
  enabled: false
  confidence_window: 30
  psi_threshold: 0.2
  error_threshold: 0.55
  cooldown_days: 7
