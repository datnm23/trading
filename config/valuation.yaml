# Valuation Engine Configuration
# WACC, terminal growth, blend weights, recommendation thresholds

dcf:
  wacc: 0.13               # Default WACC (13% VN market) — fallback if sector not in sector_wacc
  terminal_growth: 0.03    # Default Gordon terminal rate (3%)
  projection_years: 5      # Number of years to project FCF
  # Per-sector WACC/terminal-growth (non-bank only; banks → dcf_applicable=False).
  # Keys MUST match data/vn/universe.py::_VN30_META sector labels exactly.
  sector_wacc:
    "Bất động sản":            { wacc: 0.14,  terminal_growth: 0.03 }
    "Bất động sản - Đa ngành":  { wacc: 0.14,  terminal_growth: 0.03 }
    "Bất động sản bán lẻ":      { wacc: 0.14,  terminal_growth: 0.03 }
    "Thép":                    { wacc: 0.14,  terminal_growth: 0.025 }
    "Cao su":                  { wacc: 0.135, terminal_growth: 0.025 }
    "Dầu khí":                 { wacc: 0.13,  terminal_growth: 0.02 }
    "Công nghệ":               { wacc: 0.13,  terminal_growth: 0.04 }
    "Hàng không":              { wacc: 0.15,  terminal_growth: 0.03 }
    "Bán lẻ":                  { wacc: 0.125, terminal_growth: 0.03 }
    "Tiêu dùng - Bán lẻ":       { wacc: 0.125, terminal_growth: 0.03 }
    "Thực phẩm":               { wacc: 0.115, terminal_growth: 0.03 }
    "Đồ uống":                 { wacc: 0.115, terminal_growth: 0.03 }
    "Du lịch - Nghỉ dưỡng":     { wacc: 0.145, terminal_growth: 0.03 }

relative:
  peer_min_count: 3        # Minimum peers for sector median; fallback = VN30
  history_pe_years: 5      # Years of historical P/E to compute own median

blend:
  # Weights for target price: must sum to 1.0 (DCF weight applied only when dcf_applicable)
  dcf_weight: 0.5
  relative_weight: 0.5

score:
  # Contribution weights for 0-100 score (normalized internally)
  upside_weight: 0.50      # Upside to target price
  f_score_weight: 0.30     # Piotroski F-score (9 max)
  z_score_weight: 0.20     # Altman Z-score (non-bank only)

recommendation:
  buy_upside_threshold: 0.20    # upside > 20% → BUY
  sell_downside_threshold: -0.10 # upside < -10% → SELL

disclaimer: "Chỉ mang tính tham khảo, không phải lời khuyên đầu tư."
