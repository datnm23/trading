global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # -----------------------------------------------------------
  # Trading Bot — Custom metrics
  # (Use host.docker.internal for local dev)
  # -----------------------------------------------------------
  - job_name: "trading-bot"
    static_configs:
      - targets: ["172.18.0.1:8080"]
    metrics_path: /metrics
    scrape_interval: 15s

  # -----------------------------------------------------------
  # Backend API — FastAPI metrics
  # (Use host.docker.internal for local dev)
  # -----------------------------------------------------------
  - job_name: "backend-api"
    static_configs:
      - targets: ["172.18.0.1:8090"]
    metrics_path: /metrics
    scrape_interval: 15s

  # -----------------------------------------------------------
  # Prometheus — Self
  # -----------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # -----------------------------------------------------------
  # Node Exporter — Host OS metrics
  # -----------------------------------------------------------
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s
